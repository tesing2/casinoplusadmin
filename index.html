<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash In / Cash Out Dashboard</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff}header{padding:20px;text-align:center;background:#111827;font-size:28px;font-weight:bold}.wrap{max-width:1100px;margin:auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}.card{background:#1e293b;padding:18px;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.25)}h3{margin:0 0 10px}input,select,button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;font-size:15px}input,select{background:#e5e7eb;color:#111}button{background:#22c55e;color:#fff;font-weight:bold;cursor:pointer}button:hover{opacity:.9}table{width:100%;border-collapse:collapse;margin-top:15px}th,td{padding:10px;text-align:left;border-bottom:1px solid #334155}.red{color:#f87171}.green{color:#4ade80}@media(max-width:600px){header{font-size:22px}}
</style>
</head>
<body>
<header>Player Cash Dashboard</header>
<div class="wrap">
<div class="grid">
<div class="card"><h3>Total Players</h3><div id="playersCount">3</div></div>
<div class="card"><h3>Total Balance</h3><div id="totalBalance">₱0</div></div>
<div class="card"><h3>Cash In Today</h3><div id="cashInTotal" class="green">₱0</div></div>
<div class="card"><h3>Cash Out Today</h3><div id="cashOutTotal" class="red">₱0</div></div>
</div>

<div class="grid" style="margin-top:20px">
<div class="card">
<h3>Transaction</h3>
<select id="player"></select>
<select id="type">
<option value="cashin">Cash In</option>
<option value="cashout">Cash Out</option>
</select>
<input type="number" id="amount" placeholder="Enter amount">
<button onclick="submitTx()">Submit</button>
</div>
<div class="card">
<h3>Player Balances</h3>
<div id="balances"></div>
</div>
</div>

<div class="card" style="margin-top:20px">
<h3>Transaction History</h3>
<table>
<thead><tr><th>Player</th><th>Type</th><th>Amount</th><th>Time</th></tr></thead>
<tbody id="history"></tbody>
</table>
</div>
</div>
<script>
let players=[{id:1,name:'Alex',balance:500},{id:2,name:'Mia',balance:1200},{id:3,name:'Jay',balance:300}];
let logs=[];
function peso(n){return '₱'+n.toLocaleString();}
function render(){
player.innerHTML=players.map(p=>`<option value='${p.id}'>${p.name}</option>`).join('');
playersCount.textContent=players.length;
let total=players.reduce((a,b)=>a+b.balance,0); totalBalance.textContent=peso(total);
balances.innerHTML=players.map(p=>`<p>${p.name}: <b>${peso(p.balance)}</b></p>`).join('');
history.innerHTML=logs.map(l=>`<tr><td>${l.name}</td><td class='${l.type==='cashin'?'green':'red'}'>${l.type}</td><td>${peso(l.amount)}</td><td>${l.time}</td></tr>`).join('');
cashInTotal.textContent=peso(logs.filter(x=>x.type==='cashin').reduce((a,b)=>a+b.amount,0));
cashOutTotal.textContent=peso(logs.filter(x=>x.type==='cashout').reduce((a,b)=>a+b.amount,0));
}
function submitTx(){
let id=+player.value; let type=typeSel=document.getElementById('type').value; let amt=+amount.value;
if(!amt||amt<=0)return alert('Enter valid amount');
let p=players.find(x=>x.id===id);
if(type==='cashin')p.balance+=amt; else {if(p.balance<amt)return alert('Insufficient balance'); p.balance-=amt;}
logs.unshift({name:p.name,type,amount:amt,time:new Date().toLocaleString()});
amount.value=''; render();
}
render();
</script>
</body>
</html>
