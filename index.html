<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Responsive Dashboard</title><style>body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff}*{box-sizing:border-box}.wrap{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{background:#111827;padding:20px}.side h2{color:#38bdf8}.side a{display:block;color:#cbd5e1;padding:10px 0;text-decoration:none}.main{padding:20px}.top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin:20px 0}.card,.panel{background:#1e293b;border-radius:16px;padding:16px}.chat{max-height:420px;overflow:auto;display:flex;flex-direction:column;gap:10px}.msg{padding:10px 12px;border-radius:14px;max-width:80%}.left{background:#334155;align-self:flex-start}.right{background:#2563eb;align-self:flex-end}.input{display:flex;gap:10px;margin-top:12px}.input input{flex:1;padding:10px;border-radius:10px;border:none}.input button{padding:10px 14px;border:none;border-radius:10px}.table{width:100%;border-collapse:collapse}.table td,.table th{padding:10px;border-bottom:1px solid #334155;text-align:left}@media(max-width:800px){.wrap{grid-template-columns:1fr}.side{display:flex;gap:14px;overflow:auto}.side a{white-space:nowrap}.layout2{grid-template-columns:1fr!important}}</style></head><body><div class='wrap'><div class='side'><h2>CashFlow</h2><a href='#'>Dashboard</a><a href='#'>Cash In</a><a href='#'>Cash Out</a><a href='#'>Chats</a></div><div class='main'><div class='top'><h1>Cashier Panel</h1><div id='clock'></div></div><div class='grid'><div class='card'><small>Today's Cash In</small><h2>₱100</h2></div><div class='card'><small>Today's Cash Out</small><h2>₱9,870</h2></div><div class='card'><small>Transactions</small><h2>1</h2></div></div><div class='grid layout2' style='grid-template-columns:1.2fr .8fr'><div class='panel'><h3>Recent Transactions</h3><table class='table'><tr><th>ID</th><th>User</th><th>Amount</th></tr><tr><td>#1021</td><td>Player24</td><td>₱100</td></tr></table></div><div class='panel'><h3>Support Chats</h3><div class='chat' id='chat'><div class='msg left'>Hello pa cash in po ₱500</div><div class='msg right'>Processing now sir</div><div class='msg left'>Received salamat</div><div class='msg left'>Pa cash out ₱1200</div><div class='msg right'>Queued kindly wait 2 mins</div></div><div class='input'><input id='txt' placeholder='Type message'><button onclick='sendMsg()'>Send</button></div></div></div></div></div><script>function tick(){document.getElementById('clock').textContent=new Date().toLocaleString()}setInterval(tick,1000);tick();function sendMsg(){let t=document.getElementById('txt');if(!t.value.trim())return;let d=document.createElement('div');d.className='msg right';d.textContent=t.value;document.getElementById('chat').appendChild(d);t.value='';document.getElementById('chat').scrollTop=99999;setTimeout(()=>{let r=document.createElement('div');r.className='msg left';const replies=['Received processing now','Cash in confirmed','Queued kindly wait','Transaction successful','Checking payment now'];r.textContent=replies[Math.floor(Math.random()*replies.lendocument.getElementById('chat').appendChild(r);document.getElementById('chat').scrollTop=99999;},700)}</script></body></html>
